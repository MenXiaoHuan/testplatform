name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend Tests and Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: playwright-platform-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run backend tests with JaCoCo coverage
        run: mvn test

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: playwright-platform-server/target/site/jacoco/
          retention-days: 7

  frontend:
    name: Frontend Tests, Build and Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: playwright-platform-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: playwright-platform-web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests with coverage
        run: npm test -- --coverage

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: playwright-platform-web/coverage/
          retention-days: 7

      - name: Build frontend
        run: npm run build

      - name: npm audit (informational)
        run: npm audit --audit-level=high
        continue-on-error: true
