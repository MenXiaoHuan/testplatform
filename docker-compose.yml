services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${PLATFORM_DB_PASSWORD:?Set PLATFORM_DB_PASSWORD in .env}
      MYSQL_DATABASE: ${PLATFORM_DB_NAME:-playwright_platform}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${PLATFORM_MINIO_ACCESS_KEY:?Set PLATFORM_MINIO_ACCESS_KEY in .env}
      MINIO_ROOT_PASSWORD: ${PLATFORM_MINIO_SECRET_KEY:?Set PLATFORM_MINIO_SECRET_KEY in .env}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      # 循环等待域名解析成功
      until nslookup minio; do
        echo '等待minio DNS就绪...'
        sleep 1
      done
      mc alias set local http://minio:9000 "$${PLATFORM_MINIO_ACCESS_KEY}" "$${PLATFORM_MINIO_SECRET_KEY}" &&
      mc mb --ignore-existing local/$${PLATFORM_STORAGE_BUCKET:-qa-report}
      "
    environment:
      PLATFORM_MINIO_ACCESS_KEY: ${PLATFORM_MINIO_ACCESS_KEY:?Set PLATFORM_MINIO_ACCESS_KEY in .env}
      PLATFORM_MINIO_SECRET_KEY: ${PLATFORM_MINIO_SECRET_KEY:?Set PLATFORM_MINIO_SECRET_KEY in .env}
      PLATFORM_STORAGE_BUCKET: ${PLATFORM_STORAGE_BUCKET:-qa-report}

  redis:
    image: redis:7.2-alpine
    command: >
      sh -c 'redis-server --appendonly yes --requirepass "$$PLATFORM_REDIS_PASSWORD"'
    environment:
      PLATFORM_REDIS_PASSWORD: ${PLATFORM_REDIS_PASSWORD:?Set PLATFORM_REDIS_PASSWORD in .env}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${PLATFORM_REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  server:
    build:
      context: ./playwright-platform-server
      dockerfile: Dockerfile.dev
    depends_on:
      mysql:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      PLATFORM_DB_URL: jdbc:mysql://mysql:3306/${PLATFORM_DB_NAME:-playwright_platform}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      PLATFORM_DB_USERNAME: ${PLATFORM_DB_USERNAME:?Set PLATFORM_DB_USERNAME in .env}
      PLATFORM_DB_PASSWORD: ${PLATFORM_DB_PASSWORD:?Set PLATFORM_DB_PASSWORD in .env}
      PLATFORM_REDIS_HOST: redis
      PLATFORM_REDIS_PORT: 6379
      PLATFORM_REDIS_PASSWORD: ${PLATFORM_REDIS_PASSWORD:?Set PLATFORM_REDIS_PASSWORD in .env}
      PLATFORM_MINIO_ENDPOINT: http://minio:9000
      PLATFORM_MINIO_ACCESS_KEY: ${PLATFORM_MINIO_ACCESS_KEY:?Set PLATFORM_MINIO_ACCESS_KEY in .env}
      PLATFORM_MINIO_SECRET_KEY: ${PLATFORM_MINIO_SECRET_KEY:?Set PLATFORM_MINIO_SECRET_KEY in .env}
      PLATFORM_STORAGE_BUCKET: ${PLATFORM_STORAGE_BUCKET:-qa-report}
      PLATFORM_RUNNER_MODE: ${PLATFORM_RUNNER_MODE:-docker}
      PLATFORM_RUNNER_WORKSPACE_ROOT: ${PLATFORM_RUNNER_WORKSPACE_ROOT:-/workspace/.runner-workspaces}
      PLATFORM_RUNNER_HOST_WORKSPACE_ROOT: ${PLATFORM_RUNNER_HOST_WORKSPACE_ROOT:-${PWD}/.runner-workspaces}
      PLATFORM_RUNNER_DOCKER_IMAGE: ${PLATFORM_RUNNER_DOCKER_IMAGE:-mcr.microsoft.com/playwright:v1.44.0-jammy}
      PLATFORM_RUNNER_DOCKER_NETWORK: ${PLATFORM_RUNNER_DOCKER_NETWORK:-bridge}
      PLATFORM_RUNNER_DOCKER_MEMORY: ${PLATFORM_RUNNER_DOCKER_MEMORY:-2g}
      PLATFORM_RUNNER_DOCKER_CPUS: ${PLATFORM_RUNNER_DOCKER_CPUS:-2}
      PLATFORM_RUNNER_DOCKER_CONTAINER_WORKSPACE_ROOT: ${PLATFORM_RUNNER_DOCKER_CONTAINER_WORKSPACE_ROOT:-/workspace/task}
    ports:
      - "8080:8080"
    volumes:
      - ./playwright-platform-server:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.runner-workspaces:/workspace/.runner-workspaces
      - maven-cache:/root/.m2

  web:
    build:
      context: ./playwright-platform-web
      dockerfile: Dockerfile.dev
    depends_on:
      - server
    environment:
      VITE_API_PROXY_TARGET: http://server:8080
    ports:
      - "5173:5173"
    volumes:
      - ./playwright-platform-web:/workspace
      - web-node-modules:/workspace/node_modules

volumes:
  mysql-data:
  minio-data:
  redis-data:
  maven-cache:
  web-node-modules:
