services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${PLATFORM_DB_PASSWORD:-12345678}
      MYSQL_DATABASE: ${PLATFORM_DB_NAME:-playwright_platform}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${PLATFORM_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${PLATFORM_MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${PLATFORM_MINIO_ACCESS_KEY:-minioadmin} $${PLATFORM_MINIO_SECRET_KEY:-minioadmin} &&
      mc mb --ignore-existing local/$${PLATFORM_STORAGE_BUCKET:-qa-report}
      "
    environment:
      PLATFORM_MINIO_ACCESS_KEY: ${PLATFORM_MINIO_ACCESS_KEY:-minioadmin}
      PLATFORM_MINIO_SECRET_KEY: ${PLATFORM_MINIO_SECRET_KEY:-minioadmin}
      PLATFORM_STORAGE_BUCKET: ${PLATFORM_STORAGE_BUCKET:-qa-report}

  server:
    build:
      context: ./playwright-platform-server
      dockerfile: Dockerfile.dev
    depends_on:
      mysql:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: dev
      PLATFORM_DB_URL: jdbc:mysql://mysql:3306/${PLATFORM_DB_NAME:-playwright_platform}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      PLATFORM_DB_USERNAME: ${PLATFORM_DB_USERNAME:-root}
      PLATFORM_DB_PASSWORD: ${PLATFORM_DB_PASSWORD:-12345678}
      PLATFORM_MINIO_ENDPOINT: http://minio:9000
      PLATFORM_MINIO_ACCESS_KEY: ${PLATFORM_MINIO_ACCESS_KEY:-minioadmin}
      PLATFORM_MINIO_SECRET_KEY: ${PLATFORM_MINIO_SECRET_KEY:-minioadmin}
      PLATFORM_STORAGE_BUCKET: ${PLATFORM_STORAGE_BUCKET:-qa-report}
      PLATFORM_RUNNER_WORKSPACE_ROOT: /tmp/playwright-platform/workspaces
    ports:
      - "8080:8080"
    volumes:
      - ./playwright-platform-server:/workspace
      - maven-cache:/root/.m2

  web:
    build:
      context: ./playwright-platform-web
      dockerfile: Dockerfile.dev
    depends_on:
      - server
    environment:
      VITE_API_PROXY_TARGET: http://server:8080
    ports:
      - "5173:5173"
    volumes:
      - ./playwright-platform-web:/workspace
      - web-node-modules:/workspace/node_modules

volumes:
  mysql-data:
  minio-data:
  maven-cache:
  web-node-modules:
