services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${PLATFORM_DB_PASSWORD:?Set PLATFORM_DB_PASSWORD in .env}
      MYSQL_DATABASE: ${PLATFORM_DB_NAME:?Set PLATFORM_DB_NAME in .env}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${PLATFORM_MINIO_ACCESS_KEY:?Set PLATFORM_MINIO_ACCESS_KEY in .env}
      MINIO_ROOT_PASSWORD: ${PLATFORM_MINIO_SECRET_KEY:?Set PLATFORM_MINIO_SECRET_KEY in .env}
    ports:
      - "${PLATFORM_MINIO_API_HOST_PORT:?Set PLATFORM_MINIO_API_HOST_PORT in .env}:9000"
      - "${PLATFORM_MINIO_CONSOLE_HOST_PORT:?Set PLATFORM_MINIO_CONSOLE_HOST_PORT in .env}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7
    command: >
      sh -c 'redis-server --appendonly yes --requirepass "$$PLATFORM_REDIS_PASSWORD"'
    environment:
      PLATFORM_REDIS_PASSWORD: ${PLATFORM_REDIS_PASSWORD:?Set PLATFORM_REDIS_PASSWORD in .env}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${PLATFORM_REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  server:
    build:
      context: ./playwright-platform-server
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PLATFORM_DB_URL: ${PLATFORM_DB_URL:?Set PLATFORM_DB_URL in .env}
      PLATFORM_DB_USERNAME: ${PLATFORM_DB_USERNAME:?Set PLATFORM_DB_USERNAME in .env}
      PLATFORM_DB_PASSWORD: ${PLATFORM_DB_PASSWORD:?Set PLATFORM_DB_PASSWORD in .env}
      PLATFORM_REDIS_HOST: ${PLATFORM_REDIS_HOST:?Set PLATFORM_REDIS_HOST in .env}
      PLATFORM_REDIS_PORT: ${PLATFORM_REDIS_PORT:?Set PLATFORM_REDIS_PORT in .env}
      PLATFORM_REDIS_PASSWORD: ${PLATFORM_REDIS_PASSWORD:?Set PLATFORM_REDIS_PASSWORD in .env}
      PLATFORM_MINIO_ENDPOINT: ${PLATFORM_MINIO_ENDPOINT:?Set PLATFORM_MINIO_ENDPOINT in .env}
      PLATFORM_MINIO_ACCESS_KEY: ${PLATFORM_MINIO_ACCESS_KEY:?Set PLATFORM_MINIO_ACCESS_KEY in .env}
      PLATFORM_MINIO_SECRET_KEY: ${PLATFORM_MINIO_SECRET_KEY:?Set PLATFORM_MINIO_SECRET_KEY in .env}
      PLATFORM_STORAGE_BUCKET: ${PLATFORM_STORAGE_BUCKET:?Set PLATFORM_STORAGE_BUCKET in .env}
      PLATFORM_RUNNER_MODE: ${PLATFORM_RUNNER_MODE:?Set PLATFORM_RUNNER_MODE in .env}
      PLATFORM_RUNNER_WORKSPACE_ROOT: ${PLATFORM_RUNNER_WORKSPACE_ROOT:?Set PLATFORM_RUNNER_WORKSPACE_ROOT in .env}
      PLATFORM_RUNNER_HOST_WORKSPACE_ROOT: ${PLATFORM_RUNNER_HOST_WORKSPACE_ROOT:?Set PLATFORM_RUNNER_HOST_WORKSPACE_ROOT in .env}
      PLATFORM_RUNNER_DOCKER_IMAGE: ${PLATFORM_RUNNER_DOCKER_IMAGE:?Set PLATFORM_RUNNER_DOCKER_IMAGE in .env}
      PLATFORM_RUNNER_DOCKER_NETWORK: ${PLATFORM_RUNNER_DOCKER_NETWORK:?Set PLATFORM_RUNNER_DOCKER_NETWORK in .env}
      PLATFORM_RUNNER_DOCKER_MEMORY: ${PLATFORM_RUNNER_DOCKER_MEMORY:?Set PLATFORM_RUNNER_DOCKER_MEMORY in .env}
      PLATFORM_RUNNER_DOCKER_CPUS: ${PLATFORM_RUNNER_DOCKER_CPUS:?Set PLATFORM_RUNNER_DOCKER_CPUS in .env}
      PLATFORM_RUNNER_DOCKER_CONTAINER_WORKSPACE_ROOT: ${PLATFORM_RUNNER_DOCKER_CONTAINER_WORKSPACE_ROOT:?Set PLATFORM_RUNNER_DOCKER_CONTAINER_WORKSPACE_ROOT in .env}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PLATFORM_RUNNER_HOST_WORKSPACE_ROOT:?Set PLATFORM_RUNNER_HOST_WORKSPACE_ROOT in .env}:${PLATFORM_RUNNER_WORKSPACE_ROOT:?Set PLATFORM_RUNNER_WORKSPACE_ROOT in .env}
    restart: unless-stopped

  web:
    build:
      context: ./playwright-platform-web
      dockerfile: Dockerfile
    depends_on:
      - server
    ports:
      - "${PLATFORM_WEB_HOST_PORT:?Set PLATFORM_WEB_HOST_PORT in .env}:80"
    restart: unless-stopped

volumes:
  mysql-data:
  minio-data:
  redis-data:
