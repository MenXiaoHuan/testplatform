spring:
  application:
    name: playwright-platform-server
  datasource:
    url: ${PLATFORM_DB_URL}
    username: ${PLATFORM_DB_USERNAME}
    password: ${PLATFORM_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${PLATFORM_REDIS_HOST}
      port: ${PLATFORM_REDIS_PORT:6379}
      password: ${PLATFORM_REDIS_PASSWORD}
      timeout: ${PLATFORM_REDIS_TIMEOUT:2s}
  flyway:
    enabled: true
mybatis:
  configuration:
    map-underscore-to-camel-case: true
server:
  port: ${SERVER_PORT:8080}
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:200}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:10}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:100}
platform:
  cache:
    detail-ttl: ${PLATFORM_CACHE_DETAIL_TTL:5m}
    null-ttl: ${PLATFORM_CACHE_NULL_TTL:1m}
    jitter-seconds: ${PLATFORM_CACHE_JITTER_SECONDS:60}
    mutex-ttl: ${PLATFORM_CACHE_MUTEX_TTL:5s}
    lock-retry-times: ${PLATFORM_CACHE_LOCK_RETRY_TIMES:3}
    lock-wait-millis: ${PLATFORM_CACHE_LOCK_WAIT_MILLIS:50}
  task:
    execution:
      core-pool-size: 2
      max-pool-size: 4
      queue-capacity: 50
      keep-alive-seconds: 60
      install-timeout-seconds: 600
      test-timeout-seconds: 1800
      monitor-log-interval-seconds: 30
  runner:
    mode: ${PLATFORM_RUNNER_MODE:local}
    workspace-root: ${PLATFORM_RUNNER_WORKSPACE_ROOT:${java.io.tmpdir}/playwright-platform/workspaces}
    host-workspace-root: ${PLATFORM_RUNNER_HOST_WORKSPACE_ROOT:${platform.runner.workspace-root}}
    docker:
      image: ${PLATFORM_RUNNER_DOCKER_IMAGE:mcr.microsoft.com/playwright:v1.44.0-jammy}
      network: ${PLATFORM_RUNNER_DOCKER_NETWORK:bridge}
      memory: ${PLATFORM_RUNNER_DOCKER_MEMORY:2g}
      cpus: ${PLATFORM_RUNNER_DOCKER_CPUS:2}
      container-workspace-root: ${PLATFORM_RUNNER_DOCKER_CONTAINER_WORKSPACE_ROOT:/workspace/task}
      remove-container: ${PLATFORM_RUNNER_DOCKER_REMOVE_CONTAINER:true}
  storage:
    bucket: ${PLATFORM_STORAGE_BUCKET:qa-report}
    minio:
      endpoint: ${PLATFORM_MINIO_ENDPOINT}
      access-key: ${PLATFORM_MINIO_ACCESS_KEY}
      secret-key: ${PLATFORM_MINIO_SECRET_KEY}
