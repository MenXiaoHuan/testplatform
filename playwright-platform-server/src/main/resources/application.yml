spring:
  application:
    name: playwright-platform-server
  datasource:
    url: ${PLATFORM_DB_URL}
    username: ${PLATFORM_DB_USERNAME}
    password: ${PLATFORM_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
server:
  port: ${SERVER_PORT:8080}
platform:
  task:
    execution:
      core-pool-size: 2
      max-pool-size: 4
      queue-capacity: 50
      keep-alive-seconds: 60
      install-timeout-seconds: 600
      test-timeout-seconds: 1800
      monitor-log-interval-seconds: 30
  runner:
    workspace-root: ${PLATFORM_RUNNER_WORKSPACE_ROOT:${java.io.tmpdir}/playwright-platform/workspaces}
  storage:
    bucket: ${PLATFORM_STORAGE_BUCKET:qa-report}
    minio:
      endpoint: ${PLATFORM_MINIO_ENDPOINT}
      access-key: ${PLATFORM_MINIO_ACCESS_KEY}
      secret-key: ${PLATFORM_MINIO_SECRET_KEY}
